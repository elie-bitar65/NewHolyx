<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule & Image Loader</title>
    <style>
        body { font-family: sans-serif; display: flex; gap: 20px; padding: 20px; }
        .table-container { height: 90vh; overflow-y: auto; border: 1px solid #ccc; }
        table { border-collapse: collapse; width: 200px; }
        td, th { border: 1px solid #ddd; padding: 8px; text-align: center; }
        th { background-color: #f4f4f4; position: sticky; top: 0; }
        
        .upload-container { flex-grow: 1; border-left: 2px solid #eee; padding-left: 20px; }
        .image-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-top: 20px; }
        .img-slot { width: 184px; height: 88px; border: 2px dashed #bbb; display: flex; 
                    align-items: center; justify-content: center; overflow: hidden; background: #eee; }
        .img-slot img { width: 184px; height: 88px; filter: grayscale(100%); object-fit: cover; }
    </style>
</head>
<body>

<div class="table-container">
    <table>
        <thead><tr><th>Time Schedule</th></tr></thead>
        <tbody id="scheduleBody"></tbody>
    </table>
</div>

<div class="upload-container">
    <h2>Load 10 Images (184x88 BW)</h2>
    <input type="file" id="fileInput" multiple accept="image/*">
    <div class="image-grid" id="imageGrid"></div>
</div>

<script>
    // 1. Generate Table from 00:00 to 23:57 (Step 3 min)
    const tbody = document.getElementById('scheduleBody');
    for (let minutes = 0; minutes < 24 * 60; minutes += 3) {
        const hh = String(Math.floor(minutes / 60)).padStart(2, '0');
        const mm = String(minutes % 60).padStart(2, '0');
        const row = `<tr><td>${hh}:${mm}</td></tr>`;
        tbody.innerHTML += row;
    }

    // 2. Handle Image Loading (Max 10)
    const fileInput = document.getElementById('fileInput');
    const imageGrid = document.getElementById('imageGrid');

    // Create 10 empty slots
    for (let i = 0; i < 10; i++) {
        const slot = document.createElement('div');
        slot.className = 'img-slot';
        slot.innerHTML = '<span>Slot ' + (i + 1) + '</span>';
        imageGrid.appendChild(slot);
    }

    fileInput.addEventListener('change', (e) => {
        const files = Array.from(e.target.files).slice(0, 10);
        const slots = document.querySelectorAll('.img-slot');
        
        files.forEach((file, index) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                slots[index].innerHTML = `<img src="${event.target.result}">`;
            };
            reader.readAsDataURL(file);
        });
    });
</script>

</body>
</html>
